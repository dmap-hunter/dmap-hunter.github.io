<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase Auth Demo</title>
  <link rel="stylesheet" href="../Password/login.css" />
</head>
<body>
  <div class="auth-container">
    <h1>Login</h1>

    <form id="authForm">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" required />

      <div class="password-rules">
        <p id="lenRule">At least 8 characters</p>
        <p id="upperRule">At least 1 uppercase letter</p>
        <p id="lowerRule">At least 1 lowercase letter</p>
        <p id="numberRule">At least 1 number</p>
        <p id="specialRule">At least 1 special character</p>
      </div>

      <div class="button-row">
        <button type="button" id="loginBtn">Login</button>
      </div>

      <p id="message"></p>
    </form>
  </div>
  
  <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-auth-compat.js"></script>
  

  <script src="../Firebase/firebase.js"></script>
  <script src="../Password/script.js"></script>
</body>
</html>
